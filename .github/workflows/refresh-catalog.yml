name: Refresh SRAM model catalog

on:
  schedule:
    # 03:00 UTC on the 1st of each month
    - cron: "0 3 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild models.json from SRAM catalog
        run: python3 scripts/refresh_catalog.py

      - name: Commit if catalog changed
        run: |
          set -euo pipefail
          if git diff --quiet models.json; then
            echo "catalog unchanged"
            exit 0
          fi
          git config user.name  "firmware-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models.json
          git commit -m "Refresh SRAM model catalog"
          git push
